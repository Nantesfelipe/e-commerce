<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Tela de login StyleFN">
    <title>Login</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">



</head>

<body class="body">
    <main class="container-login">

        <form id="login-form">
            <h1>Style FN</h1>
            <h2>Realize seu login!</h2>

            <div class="input-box">
                <input id="email" type="email" placeholder="Digite seu email">
                <i class="bi bi-person-circle"></i>
            </div>

            <div class="input-box">
                <input id="password" type="password" placeholder="Digite sua senha ">
                <i class="bi bi-key-fill"></i>
            </div>

            <div>
            <button id="login-btn" type="submit">Entrar</button>
            </div>
            
            
            <div class="remember-password">
                <p><input id="remember-checkbox" type="checkbox" class="checkbox"> Lembrar minha senha</p>
                <br>
            </div>
            
            <div class="forgot-password">
                <a id="forgot-password-link" href="#">Esqueci minha senha</a>

            </div>
            



            <div class="register">
                <p>Não tem um conta? <a id="register-link" href="#">Registre-se!</a></p>
            </div>
        </form>
    </main>

</body>
    <script type="module" src="/assets/js/main.js" ></script>


</html>
