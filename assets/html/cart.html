<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Carrinho de compras">
    <title>Carrinho</title>

    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/header.css">
    <link rel="stylesheet" href="/assets/css/productlist.css">
    <link rel="stylesheet" href="/assets/css/cart.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="body">

    <!-- HEADER -->
    <header class="header-productlist">

        <div class="header-productlist-top">
            <h1 class="title">Seu Carrinho</h1>
            <img class="logo-productlist" src="/assets/img/Logo.png">
        </div>

        <div class="search-box-productlist search-box">
            <form>
                <input type="search" placeholder="Buscar no carrinho...">
            </form>
        </div>

        <div class="header-links">
            <nav class="navigation-body">
                <a href="/assets/html/index.html">Voltar</a>
                <a href="cart.html" class="cartlist-link">
                    <i class="fa-solid fa-cart-shopping"></i>
                </a>
            </nav>
        </div>

    </header>

    
    <main>

    <h2 class="title-cart">Produtos no Carrinho</h2>

    <!-- CONTAINER DOS ITENS -->
    <section id="cart-items" class="cart-list">
        <!-- itens serão inseridos depois via JS -->
    </section>

    <!-- TOTAL -->
    <section class="cart-total">
        <h3 id="cart-total">Total: R$ 0,00</h3>
        <button id="checkout-btn" class="checkout-btn">Finalizar Compra</button>
    </section>

</main>

    <footer>
        <p>&copy; 2025 Style FN - Todos os direitos reservados.</p>
    </footer>

</body>
    <script type="module" src="/assets/js/main.js" ></script>
</html>
